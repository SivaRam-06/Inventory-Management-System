{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>Suppliers</h4>
  <a href="{{ url_for('add_supplier') }}" class="btn btn-primary">Add Supplier</a>
</div>
<form method="get" class="mb-3">
  <div class="input-group">
    <input name="q" value="{{ q }}" class="form-control" placeholder="Search suppliers">
    <button class="btn btn-outline-secondary">Search</button>
  </div>
</form>
<table class="table table-striped">
  <thead><tr><th>Name</th><th>Contact</th><th>Phone</th><th></th></tr></thead>
  <tbody>
    {% for s in pagination.items %}
      <tr>
        <td>{{ s.supplier_name }}</td>
        <td>{{ s.contact_person }}</td>
        <td>{{ s.phone }}</td>
        <td>
          <a class="btn btn-sm btn-secondary" href="{{ url_for('edit_supplier', id=s.id) }}">Edit</a>
          <form method="post" action="{{ url_for('delete_supplier', id=s.id) }}" style="display:inline" onsubmit="return confirm('Delete?')">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
