{% extends 'layout.html' %}
{% block content %}
<h4>Inventory Logs</h4>
<table class="table table-sm">
  <thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Qty</th><th>User</th><th>Notes</th></tr></thead>
  <tbody>
    {% for l in pagination.items %}
      <tr>
        <td>{{ l.created_at }}</td>
        <td>{{ l.product.name }}</td>
        <td>{{ l.action_type }}</td>
        <td>{{ l.quantity }}</td>
        <td>{{ l.user }}</td>
        <td>{{ l.notes }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
