{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>Categories</h4>
  <a href="{{ url_for('add_category') }}" class="btn btn-primary">Add Category</a>
</div>
<form method="get" class="mb-3">
  <div class="input-group">
    <input name="q" value="{{ q }}" class="form-control" placeholder="Search categories">
    <button class="btn btn-outline-secondary">Search</button>
  </div>
</form>
<table class="table table-striped">
  <thead><tr><th>Name</th><th>Description</th><th></th></tr></thead>
  <tbody>
    {% for c in pagination.items %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.description }}</td>
        <td>
          <a class="btn btn-sm btn-secondary" href="{{ url_for('edit_category', id=c.id) }}">Edit</a>
          <form method="post" action="{{ url_for('delete_category', id=c.id) }}" style="display:inline" onsubmit="return confirm('Delete?')">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
